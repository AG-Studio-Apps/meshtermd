name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test ./... -race -count=1

  fuzz:
    name: Fuzz parsers (bounded)
    runs-on: ubuntu-latest
    # Fuzz is slow; only run on pushes to main (and tag pushes), not
    # every PR. PRs still get the regular -race test pass via the
    # `test` job above, which exercises the seed corpus deterministically.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Minisign parser fuzz (30s)
        run: go test -run='^$' -fuzz=FuzzParseMinisig -fuzztime=30s ./internal/release

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck
        run: govulncheck ./...

  build:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-amd64
          - linux-arm64
          - linux-armv7
          - darwin-amd64
          - darwin-arm64
          - freebsd-amd64
          - freebsd-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.target }}
        run: make dist-${{ matrix.target }}

      - name: Show binary size
        run: ls -la dist/
