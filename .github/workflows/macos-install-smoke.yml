# One-off smoke test: runs all six install stages against a fresh
# macos-14 host automatically and verifies the daemon boots. NOT a
# recurring guard — workflow_dispatch only.
#
# Validates:
#   - meshtermd-darwin-arm64 download + minisign signature check + sha256 hash
#   - Binary installs into ~/.local/bin and executes (`meshtermd version`)
#   - LaunchAgent plist generated correctly via `meshtermd unit print`
#   - launchctl bootstrap works in CI (may not — GH runners lack a full
#     GUI session; we report rather than fail on this step)
#   - Manual `meshtermd serve` fallback path works
#   - `meshtermd status` and `mtctl list` round-trip via the IPC socket
#
# Does NOT test the iOS-driven install flow — that requires a real
# OpenSSH endpoint meshTerm can reach. tmate's custom bastion was a
# dead-end (NIOSSH compat issues, channel error 9).

name: macOS Install Smoke (one-off)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to install (e.g. v0.9.7)
        default: v0.9.7
        required: true

jobs:
  install:
    runs-on: macos-14  # Apple Silicon
    timeout-minutes: 10
    steps:
      - name: Install minisign
        run: brew install minisign

      - name: Stage 1 — probe (mirrors RoamInstaller .probing)
        run: |
          echo "OS:        $(uname -s)"
          echo "Arch:      $(uname -m)"
          echo "launchctl: $(command -v launchctl)"
          echo "systemctl: $(command -v systemctl || echo none)"
          echo "uid:       $(id -u)"
          echo "user:      $(whoami)"

      - name: Stage 2 — download SHA256SUMS + signature + binary
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -eux
          ASSET=meshtermd-darwin-arm64
          BASE="https://github.com/AG-Studio-Apps/meshtermd/releases/download/$TAG"
          curl -fL "$BASE/SHA256SUMS"          -o /tmp/SHA256SUMS
          curl -fL "$BASE/SHA256SUMS.minisig"  -o /tmp/SHA256SUMS.minisig
          curl -fL "$BASE/$ASSET"              -o "/tmp/$ASSET"
          ls -la /tmp/SHA256SUMS* "/tmp/$ASSET"

      - name: Stage 3 — verify minisign signature + sha256 hash
        run: |
          set -eux
          curl -fsSL https://raw.githubusercontent.com/AG-Studio-Apps/meshtermd/main/docs/release-public-key.txt -o /tmp/meshtermd-pub.txt
          minisign -V -p /tmp/meshtermd-pub.txt -m /tmp/SHA256SUMS
          (cd /tmp && shasum -a 256 -c SHA256SUMS --ignore-missing 2>&1 | grep meshtermd-darwin-arm64 | grep -v FAILED)

      - name: Stage 4 — install binary into ~/.local/bin
        run: |
          set -eux
          mkdir -p ~/.local/bin
          mv /tmp/meshtermd-darwin-arm64 ~/.local/bin/meshtermd
          chmod 755 ~/.local/bin/meshtermd
          # GitHub-hosted runners don't apply the quarantine xattr to
          # things downloaded via curl, but strip it defensively in case
          # the runner image changes that. Real users via the iOS flow
          # do the same step (or right-click → Open).
          xattr -d com.apple.quarantine ~/.local/bin/meshtermd 2>/dev/null || true
          ~/.local/bin/meshtermd version

      - name: Stage 5 — generate + install LaunchAgent
        # `meshtermd unit print` is the canonical plist source. We
        # always succeed on the file write; we only "soft-fail" on the
        # launchctl bootstrap step because macos-14 GH runners do not
        # have a full GUI session, which is what `gui/<uid>` bootstrap
        # requires. Real users on a real Mac get a GUI session at
        # login. Reporting the bootstrap exit code is the goal — not
        # gating the test on it.
        run: |
          set -eu
          mkdir -p ~/Library/LaunchAgents
          PLIST=~/Library/LaunchAgents/com.agstudio.meshtermd.plist
          ~/.local/bin/meshtermd unit print > "$PLIST"
          echo "--- generated plist ---"
          cat "$PLIST"
          echo "--- attempting launchctl bootstrap (expected to fail in CI) ---"
          if launchctl bootstrap "gui/$(id -u)" "$PLIST" 2>&1; then
            echo "launchctl-bootstrap: SUCCESS"
            sleep 2
            launchctl print "gui/$(id -u)/com.agstudio.meshtermd" 2>&1 | head -15 || true
          else
            echo "launchctl-bootstrap: EXPECTED FAILURE in CI (no GUI session)"
          fi

      - name: Stage 6 — manual serve + IPC liveness
        # If launchctl bootstrap didn't take, spawn the daemon directly
        # so we can verify the binary + IPC layer work. Real users on
        # macOS get launchd handling; this fallback exists in
        # RoamInstaller.swift too for restricted hosts.
        run: |
          set -eu
          if ! ~/.local/bin/meshtermd status >/dev/null 2>&1; then
            echo "launchd path not active — spawning manually"
            nohup ~/.local/bin/meshtermd serve --addr=127.0.0.1:0 >/tmp/meshtermd.log 2>&1 &
            sleep 3
          fi
          echo "--- meshtermd version ---"
          ~/.local/bin/meshtermd version
          echo "--- meshtermd status ---"
          if ! ~/.local/bin/meshtermd status; then
            echo "--- meshtermd serve log ---"
            cat /tmp/meshtermd.log || true
            exit 1
          fi
          echo "--- meshtermd list --json ---"
          ~/.local/bin/meshtermd list --json

      - name: Tear down
        if: always()
        run: |
          # Best-effort cleanup so a re-run starts clean if we ever
          # cache state between runs (not currently, but defensive).
          launchctl bootout "gui/$(id -u)/com.agstudio.meshtermd" 2>/dev/null || true
          pkill -f 'meshtermd serve' 2>/dev/null || true
          rm -f ~/Library/LaunchAgents/com.agstudio.meshtermd.plist
          rm -f ~/.local/bin/meshtermd
          rm -rf ~/.local/share/meshtermd
